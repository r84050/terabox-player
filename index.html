<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TeraBox Video Player</title>
    <link href="https://cdn.plyr.io/3.7.8/plyr.css" rel="stylesheet">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: sans-serif; margin: 0; padding: 0; background-color: #1a1a1a; color: #fff; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .container { width: 90%; max-width: 800px; background-color: #2a2a2a; padding: 20px; border-radius: 8px; box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2); }
        h1 { text-align: center; color: #00bcd4; margin-bottom: 20px; }
        video { width: 100%; height: auto; border-radius: 4px; }
        .quality-selector { text-align: center; margin-top: 15px; }
        .quality-selector button { background-color: #00bcd4; color: white; border: none; padding: 8px 15px; margin: 5px; border-radius: 5px; cursor: pointer; font-size: 1em; }
        .quality-selector button:hover { background-color: #0097a7; }
        .quality-selector button.active { background-color: #007985; }
        .fallback-link { text-align: center; margin-top: 20px; }
        .fallback-link a { color: #00bcd4; text-decoration: none; font-weight: bold; }
        .fallback-link a:hover { text-decoration: underline; }
        #status-message { text-align: center; color: #ffeb3b; margin-top: 10px; font-size: 0.9em; }
    </style>
</head>
<body>
    <div class="container">
        <h1 id="video-title">TeraBox Video</h1>
        <div id="status-message">Loading video...</div>
        <video controls crossorigin playsinline>
            <!-- Video source will be injected by JavaScript -->
        </video>
        <div id="quality-buttons" class="quality-selector"></div>
        <div id="fallback-section" class="fallback-link" style="display:none;">
            <p>If the video doesn't play, try opening it directly:</p>
            <a id="direct-link" href="#" target="_blank">Open Video in Browser</a>
        </div>
    </div>
    <script src="https://cdn.plyr.io/3.7.8/plyr.polyfilled.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <script>
        const player = new Plyr("video");
        const video = document.querySelector("video");
        const videoTitle = document.getElementById("video-title");
        const qualityButtonsContainer = document.getElementById("quality-buttons");
        const fallbackSection = document.getElementById("fallback-section");
        const directLink = document.getElementById("direct-link");
        const statusMessage = document.getElementById("status-message");
        let currentHls = null;

        function setStatus(message, isError = false) {
            statusMessage.textContent = message;
            statusMessage.style.color = isError ? '#ff5252' : '#ffeb3b';
        }

        function changeQuality(url, button) {
            setStatus("Loading stream...");
            if (currentHls) {
                currentHls.destroy();
            }
            if (Hls.isSupported() && url.endsWith(".m3u8")) {
                currentHls = new Hls();
                currentHls.loadSource(url);
                currentHls.attachMedia(video);
                currentHls.on(Hls.Events.MANIFEST_PARSED, function() {
                    video.play().then(() => setStatus("Playing HLS stream.")).catch(e => setStatus(`Error playing HLS: ${e.message}`, true));
                });
                currentHls.on(Hls.Events.ERROR, function(event, data) {
                    setStatus(`HLS Error: ${data.type} - ${data.details}`, true);
                    fallbackSection.style.display = 'block';
                });
            } else if (video.canPlayType("video/mp4")) {
                video.src = url;
                video.play().then(() => setStatus("Playing MP4 stream.")).catch(e => setStatus(`Error playing MP4: ${e.message}`, true));
            } else {
                setStatus("Neither HLS nor MP4 is supported by your browser.", true);
                fallbackSection.style.display = 'block';
            }

            // Update active button style
            document.querySelectorAll(".quality-selector button").forEach(btn => {
                btn.classList.remove("active");
            });
            if (button) {
                button.classList.add("active");
            }
        }

        document.addEventListener("DOMContentLoaded", () => {
            const urlParams = new URLSearchParams(window.location.search);
            const videoDataString = urlParams.get("videoData");

            if (videoDataString) {
                try {
                    // FIXED: Decode base64 instead of URL-encoded JSON
                    // Decode base64
                    let decodedString;
                    try {
                        decodedString = atob(videoDataString.replace(/-/g, '+').replace(/_/g, '/'));
                    } catch (e) {
                        // If standard base64 fails, try URL-safe base64
                        decodedString = atob(videoDataString);
                    }
                    
                    // Convert decoded base64 to UTF-8 string
                    const jsonString = decodeURIComponent(
                        Array.from(decodedString).map(c => 
                            '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2)
                        ).join('')
                    );
                    
                    const videoData = JSON.parse(jsonString);
                    
                    videoTitle.textContent = videoData.name || "TeraBox Video";

                    let primaryUrl = null;
                    let qualities = {};

                    if (videoData.fast_stream_url) {
                        for (const q in videoData.fast_stream_url) {
                            qualities[q] = videoData.fast_stream_url[q];
                        }
                        // Prioritize highest quality HLS
                        primaryUrl = qualities["1080p"] || qualities["720p"] || qualities["480p"] || qualities["360p"] || Object.values(qualities)[0];
                    }

                    if (!primaryUrl && videoData.normal_dlink) {
                        primaryUrl = videoData.normal_dlink;
                        qualities["MP4"] = primaryUrl; // Add MP4 as a quality option if it's the only one
                    }

                    if (primaryUrl) {
                        // Set direct link fallback
                        directLink.href = primaryUrl;

                        // Create quality buttons
                        let firstButton = true;
                        for (const quality in qualities) {
                            const button = document.createElement("button");
                            button.textContent = quality;
                            button.dataset.url = qualities[quality];
                            button.onclick = () => changeQuality(qualities[quality], button);
                            qualityButtonsContainer.appendChild(button);
                            if (firstButton) {
                                button.classList.add("active");
                                firstButton = false;
                            }
                        }
                        changeQuality(primaryUrl, document.querySelector(".quality-selector button.active"));
                    } else {
                        setStatus("No playable video source found from TeraBox API.", true);
                        fallbackSection.style.display = 'block';
                    }
                } catch (e) {
                    console.error("Parsing error:", e);
                    console.error("Raw data:", videoDataString);
                    setStatus(`Error parsing video data: ${e.message}`, true);
                    fallbackSection.style.display = 'block';
                }
            } else {
                setStatus("Video data not provided in URL.", true);
                fallbackSection.style.display = 'block';
            }
            // Initialize Telegram Web App (optional, but good practice)
            if (window.Telegram && window.Telegram.WebApp) {
                window.Telegram.WebApp.ready();
                window.Telegram.WebApp.expand();
            }
        });
    </script>
</body>
</html>
